<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rive Hello World</title>
  </head>
  <body>
    <!-- <canvas id="canvas" width="500" height="500"></canvas> -->
    <canvas id="canvas"></canvas>
    <script>
    const canvas = document.getElementById("myCanvas");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      // Set drawing buffer dimensions directly to the window size
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      // Draw your filled rectangle to cover the new area
      ctx.fillStyle = "royalblue";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // Run on initial load
    resizeCanvas();

    // Re-run whenever the user resizes the browser window
    window.addEventListener("resize", resizeCanvas);
  </script>
    

    <script src="https://unpkg.com/@rive-app/webgl2@2"></script>
    <script>
      const r = new rive.Rive({
        src: "https://g1234567899.github.io/Test/frog_and_fly.riv",
        canvas: document.getElementById("canvas"),
        autoplay: true,
        autoBind: true,
        artboard: "Artboard2", 
        // Optional. If not supplied the default is selected
        stateMachines: "State Machine 1",
        onLoad: () => {
          // Ensure the drawing surface matches the canvas size and device pixel ratio
          r.resizeDrawingSurfaceToCanvas();
        },
      });
    </script>
  </body>
</html>
